# User-authored guidelines. Each entry binds a rule `id` (implemented in
# src/rules/) to its parameters. Edit freely — tuning needs no code change.
# Add a new rule: implement it in src/rules/, register it, then list it here.
rules:
  - id: cs_at_10
    enabled: true
    description: "Reach a CS target by a given minute."
    params:
      minute: 10
      min_cs: 70

  - id: deaths_before_minute
    enabled: true
    description: "Avoid dying too early."
    params:
      before_minute: 8
      max_deaths: 1

  - id: boots_type_match
    enabled: true
    description: "If you built defensive boots, are they the right resist type
      for the damage you took? (Offensive/no boots are not evaluated.)"
    params:
      threshold: 0.6

  - id: not_behind_at_minute
    enabled: true
    description: "Not significantly behind your lane opponent (gold) at 15:00."
    params:
      minute: 15
      max_gold_deficit: 500
